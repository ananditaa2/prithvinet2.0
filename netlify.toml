[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from = "/api/*"
  to = "https://prithvinet-api.onrender.com/api/:splat"
  status = 200

[[redirects]]
  from = "/ws/*"
  to = "wss://prithvinet-api.onrender.com/ws/:splat"
  status = 200

[[redirects]]
  from "/*"
  to = "/index.html"
  status = 200

[dev]
  command = "npm run dev"
  targetPort = 8080
  publish = "dist"
  autoLaunch = true
